name: Weekly Trend Scan

# NOTE: This workflow is coming soon — the /api/trend-scan endpoint is not yet
# implemented in the backend. Uncomment the schedule below once you've built
# the trend-scan route (see CLAUDE.md for guidance on adding new agent routes).

on:
  # schedule:
  #   # Monday at 10am UTC
  #   - cron: '7 10 * * 1'
  workflow_dispatch: {}

jobs:
  trend-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Scan trends and update calendar
        env:
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          TIMESTAMP="$(date +%s)"
          BODY='{}'
          SIGNING_INPUT="POST:/api/trend-scan:${TIMESTAMP}:${BODY}"
          SIGNATURE="$(printf "%s" "${SIGNING_INPUT}" | openssl dgst -sha256 -hmac "${API_SECRET_KEY}" -hex | awk '{print $2}')"

          curl --fail-with-body \
            -X POST "${SITE_URL}/api/trend-scan" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${API_SECRET_KEY}" \
            -H "x-timestamp: ${TIMESTAMP}" \
            -H "x-signature: ${SIGNATURE}" \
            -d "${BODY}"

      - name: Summary
        if: always()
        run: echo "Trend scan completed with exit code $?"
